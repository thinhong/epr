name: Publish to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Let the workflow push the rendered site to the gh-pages branch
permissions:
  contents: write

# Never run two deploys at once
concurrency:
  group: quarto-publish
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # Renders from the committed _freeze/ results, so no R is needed in CI.
      - name: Render and publish to gh-pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
