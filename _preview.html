<!doctype html><html><head><meta charset="utf-8"><title>cusum preview</title><style>
:root{--epr-ink:#1f2933;--epr-muted:#64748b;--epr-grid:#e7ecf1;--epr-surface:#ffffff;--epr-surfaceAlt:#f4f7fa;--epr-expected:#0f9b8e;--epr-band:rgba(15,155,142,.14);--epr-accent:#2563eb;--epr-accentSoft:rgba(37,99,235,.13);--epr-alarm:#d97706;--epr-alarmStrong:#dc2626;--epr-good:#0f9b8e}
body{font-family:Inter,system-ui,-apple-system,sans-serif;max-width:900px;margin:18px auto;padding:0 16px;background:#fff;color:#1f2933}
</style></head><body>
<div id="cusum-game" class="epr-mount"></div>
<script>
(function (global) {
  "use strict";

  var EPR = {};

  var FALLBACK = {
    ink: "#1f2933",
    muted: "#64748b",
    grid: "#e7ecf1",
    surface: "#ffffff",
    surfaceAlt: "#f4f7fa",
    expected: "#0f9b8e",
    band: "rgba(15,155,142,0.14)",
    accent: "#2563eb",
    accentSoft: "rgba(37,99,235,0.13)",
    alarm: "#d97706",
    alarmStrong: "#dc2626",
    good: "#0f9b8e"
  };

  EPR.color = function (name) {
    try {
      var v = getComputedStyle(document.documentElement).getPropertyValue("--epr-" + name);
      if (v && v.trim()) return v.trim();
    } catch (e) {}
    return FALLBACK[name] || "#000000";
  };

  EPR.colors = function () {
    var o = {};
    for (var k in FALLBACK) { if (FALLBACK.hasOwnProperty(k)) o[k] = EPR.color(k); }
    return o;
  };

  EPR.reducedMotion = function () {
    try { return global.matchMedia("(prefers-reduced-motion: reduce)").matches; }
    catch (e) { return false; }
  };

  EPR.round = function (n, dp) {
    var f = Math.pow(10, dp || 0);
    return Math.round(n * f) / f;
  };

  EPR.clamp = function (n, lo, hi) {
    return Math.max(lo, Math.min(hi, n));
  };

  EPR.rng = function (seed) {
    var a = seed >>> 0;
    return function () {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      var t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  };

  EPR.gauss = function (rnd) {
    var u = 0, v = 0;
    while (u === 0) u = rnd();
    while (v === 0) v = rnd();
    return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
  };

  EPR.series = function (opts) {
    var n = opts.n, mu0 = opts.mu0, sigma = opts.sigma;
    var ds = opts.driftStart, delta = opts.delta, seed = opts.seed == null ? 7 : opts.seed;
    var rnd = EPR.rng(seed), out = [];
    for (var i = 0; i < n; i++) {
      var mean = mu0 + (i >= ds ? delta : 0);
      out.push(EPR.round(mean + EPR.gauss(rnd) * sigma, 1));
    }
    return out;
  };

  EPR.cusumUpper = function (x, mu0, k) {
    var S = [], prev = 0;
    for (var i = 0; i < x.length; i++) {
      var s = Math.max(0, prev + (x[i] - mu0) - k);
      S.push(s); prev = s;
    }
    return S;
  };

  EPR.cusumLower = function (x, mu0, k) {
    var S = [], prev = 0;
    for (var i = 0; i < x.length; i++) {
      var s = Math.max(0, prev + (mu0 - x[i]) - k);
      S.push(s); prev = s;
    }
    return S;
  };

  EPR.accumNoLeak = function (x, mu0) {
    var S = [], prev = 0;
    for (var i = 0; i < x.length; i++) {
      var s = Math.max(0, prev + (x[i] - mu0));
      S.push(s); prev = s;
    }
    return S;
  };

  EPR.cusumNoFloor = function (x, mu0, k) {
    var S = [], prev = 0;
    for (var i = 0; i < x.length; i++) {
      var s = prev + (x[i] - mu0 - k);
      S.push(s); prev = s;
    }
    return S;
  };

  EPR.firstCross = function (S, h) {
    for (var i = 0; i < S.length; i++) { if (S[i] > h) return i; }
    return -1;
  };

  EPR.siegmundARL = function (delta, k, h) {
    var d = delta - k;
    var b = h + 1.166;
    if (Math.abs(d) < 1e-6) return b * b;
    return (Math.exp(-2 * d * b) + 2 * d * b - 1) / (2 * d * d);
  };

  EPR.tween = function (from, to, dur, onUpdate, onDone) {
    if (EPR.reducedMotion() || dur <= 0) {
      onUpdate(to);
      if (onDone) onDone();
      return { stop: function () {} };
    }
    var start = null, raf = null, stopped = false;
    function ease(t) { return 1 - Math.pow(1 - t, 3); }
    function frame(ts) {
      if (stopped) return;
      if (start === null) start = ts;
      var p = Math.min(1, (ts - start) / dur);
      onUpdate(from + (to - from) * ease(p));
      if (p < 1) { raf = global.requestAnimationFrame(frame); }
      else if (onDone) onDone();
    }
    raf = global.requestAnimationFrame(frame);
    return { stop: function () { stopped = true; if (raf) global.cancelAnimationFrame(raf); } };
  };

  EPR.injectStyles = function () {
    if (document.getElementById("epr-viz-styles")) return;
    var css =
".epr-fig{--ink:var(--epr-ink,#1f2933);--muted:var(--epr-muted,#64748b);--grid:var(--epr-grid,#e7ecf1);--surface:var(--epr-surface,#fff);--surfaceAlt:var(--epr-surfaceAlt,#f4f7fa);--expected:var(--epr-expected,#0f9b8e);--accent:var(--epr-accent,#2563eb);--alarm:var(--epr-alarm,#d97706);--alarmStrong:var(--epr-alarmStrong,#dc2626);" +
"font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;color:var(--ink);background:var(--surface);border:1px solid var(--grid);border-radius:16px;padding:18px 18px 16px;max-width:860px;margin:0 auto;line-height:1.55}" +
".epr-fig *{box-sizing:border-box}" +
".epr-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:6px}" +
".epr-kicker{font-size:.78rem;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);font-weight:600}" +
".epr-title{font-size:1.32rem;font-weight:600;margin:2px 0 0}" +
".epr-dots{display:flex;gap:7px;align-items:center;padding-top:4px}" +
".epr-dot{width:9px;height:9px;border-radius:50%;background:var(--grid);transition:background .2s,transform .2s}" +
".epr-dot.on{background:var(--accent);transform:scale(1.25)}" +
".epr-caption{font-size:1.08rem;color:var(--ink);margin:10px 0 12px;min-height:3.2em}" +
".epr-caption b{color:var(--accent);font-weight:600}" +
".epr-readouts{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}" +
".epr-chip{background:var(--surfaceAlt);border-radius:10px;padding:7px 12px;font-size:.95rem;color:var(--muted);display:flex;gap:7px;align-items:baseline}" +
".epr-chip .v{color:var(--ink);font-weight:600;font-variant-numeric:tabular-nums;font-size:1.05rem}" +
".epr-chip.warn .v{color:var(--alarm)}.epr-chip.bad .v{color:var(--alarmStrong)}.epr-chip.good .v{color:var(--expected)}" +
".epr-stage,.epr-chart{display:block;width:100%;height:auto;margin:2px 0}" +
".epr-chart.hidden,.epr-stage.hidden{display:none}" +
".epr-result{border-radius:12px;padding:11px 14px;margin:10px 0 2px;font-size:1.02rem;font-weight:500;display:none}" +
".epr-result.show{display:block}" +
".epr-result.good{background:rgba(15,155,142,.12);color:#0b6e58}" +
".epr-result.warn{background:rgba(217,119,6,.12);color:#9a5a06}" +
".epr-result.bad{background:rgba(220,38,38,.10);color:#a3271f}" +
".epr-controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:14px}" +
".epr-spacer{flex:1 1 auto}" +
".epr-btn{appearance:none;border:1px solid var(--grid);background:var(--surface);color:var(--ink);font:inherit;font-size:1rem;font-weight:500;min-height:46px;padding:0 18px;border-radius:11px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:background .15s,border-color .15s,transform .05s}" +
".epr-btn:hover{background:var(--surfaceAlt)}" +
".epr-btn:active{transform:scale(.98)}" +
".epr-btn:focus-visible{outline:3px solid var(--accentSoft,rgba(37,99,235,.3));outline-offset:2px}" +
".epr-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}" +
".epr-btn.primary:hover{filter:brightness(1.06)}" +
".epr-btn.danger{background:var(--alarmStrong);border-color:var(--alarmStrong);color:#fff;font-weight:600;min-height:52px;padding:0 26px;font-size:1.08rem}" +
".epr-btn.danger:hover{filter:brightness(1.05)}" +
".epr-btn:disabled{opacity:.45;cursor:default}" +
".epr-scrub{flex:1 1 180px;min-width:140px;accent-color:var(--accent);height:30px}" +
".epr-sliders{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px 18px;width:100%;margin-top:4px}" +
".epr-slider{display:flex;flex-direction:column;gap:3px}" +
".epr-slider .lab{display:flex;justify-content:space-between;font-size:.95rem;color:var(--muted)}" +
".epr-slider .lab .val{color:var(--ink);font-weight:600;font-variant-numeric:tabular-nums}" +
".epr-slider input{width:100%;accent-color:var(--accent);height:28px}" +
".epr-toggle{display:flex;gap:8px;flex-wrap:wrap}" +
".epr-chiptog{border:1px solid var(--grid);background:var(--surface);color:var(--muted);border-radius:999px;padding:8px 15px;font-size:.95rem;font-weight:500;cursor:pointer;min-height:42px}" +
".epr-chiptog.on{background:var(--accentSoft,rgba(37,99,235,.13));color:var(--accent);border-color:var(--accent)}" +
".epr-formula{background:var(--surfaceAlt);border-radius:12px;padding:14px 16px;margin:8px 0 4px;font-size:1.16rem;font-family:'Iosevka',ui-monospace,'SF Mono',Menlo,Consolas,monospace;text-align:center;font-variant-numeric:tabular-nums;overflow-x:auto}" +
".epr-formula .mu{color:var(--expected);font-weight:600}.epr-formula .k{color:var(--alarm);font-weight:600}.epr-formula .s{color:var(--accent);font-weight:600}.epr-formula .h{color:var(--alarmStrong);font-weight:600}" +
".epr-legend{display:flex;flex-wrap:wrap;gap:8px 16px;margin:6px 0 2px;font-size:.95rem;color:var(--muted)}" +
".epr-leg{display:flex;align-items:center;gap:7px}" +
".epr-sw{width:14px;height:14px;border-radius:4px;flex:none}" +
"@media (max-width:560px){.epr-fig{padding:15px 13px}.epr-title{font-size:1.18rem}.epr-caption{font-size:1.05rem}.epr-btn{flex:1 1 auto;justify-content:center}.epr-controls{gap:8px}}";
    var s = document.createElement("style");
    s.id = "epr-viz-styles";
    s.textContent = css;
    document.head.appendChild(s);
  };

  global.EPR = EPR;
})(typeof window !== "undefined" ? window : this);

</script>
<script>
(function () {
  "use strict";

  function init() {
    if (!window.EPR) return;
    EPR.injectStyles();
    injectGameStyles();
    var mount = document.getElementById("cusum-game");
    if (!mount) return;
    if (mount.getAttribute("data-built") === "1") return;
    mount.setAttribute("data-built", "1");
    build(mount);
  }

  function injectGameStyles() {
    if (document.getElementById("epr-cusum-styles")) return;
    var css =
      ".epr-fig .epr-hint{font-size:1.02rem;color:var(--ink);margin:6px 0 10px;background:var(--surfaceAlt);border-radius:10px;padding:9px 13px;border-left:4px solid var(--accent)}" +
      ".epr-fig .epr-hint.good{border-left-color:var(--expected)}.epr-fig .epr-hint.warn{border-left-color:var(--alarm)}.epr-fig .epr-hint.bad{border-left-color:var(--alarmStrong)}" +
      ".epr-fig .epr-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:8px 0 2px}" +
      ".epr-fig .epr-seg{display:inline-flex;border:1px solid var(--grid);border-radius:10px;overflow:hidden}" +
      ".epr-fig .epr-seg button{appearance:none;border:0;background:var(--surface);color:var(--muted);font:inherit;font-size:.95rem;font-weight:500;padding:9px 15px;min-height:44px;cursor:pointer}" +
      ".epr-fig .epr-seg button.on{background:var(--accent);color:#fff}" +
      ".epr-fig .epr-spin{font-variant-numeric:tabular-nums}";
    var s = document.createElement("style");
    s.id = "epr-cusum-styles"; s.textContent = css;
    document.head.appendChild(s);
  }

  var NS = "http://www.w3.org/2000/svg";
  function svg(tag, attrs, parent) {
    var e = document.createElementNS(NS, tag);
    if (attrs) for (var k in attrs) if (attrs.hasOwnProperty(k)) e.setAttribute(k, attrs[k]);
    if (parent) parent.appendChild(e);
    return e;
  }
  function clear(n) { while (n && n.firstChild) n.removeChild(n.firstChild); }
  function lin(d0, d1, r0, r1) { return function (v) { return r0 + (v - d0) / (d1 - d0) * (r1 - r0); }; }

  var N = 40, MU0 = 3, SIGMA = 0.1, DELTA = 0.2, K = 0.1, H = 0.7, PXG = 80, TMAX = 1.2;
  var ROWL = 72, ROWR = 540, SLOT = (ROWR - ROWL) / N;
  var BBOT = 172, FL = 130, BTOP = 98;
  var TANK_X = 564, TANK_W = 80, TANK_BOT = 172, TANK_TOP = TANK_BOT - TMAX * PXG;
  var rimY = TANK_BOT - H * PXG;
  function slotX(i) { return ROWL + (i + 0.5) * SLOT; }
  var LIQ = "#86c5e0", OVER = "#d97706", GLASS = "#f8fafc", GLASS_ST = "#cbd5e1", CAP = "#7c6ed6",
      BELT = "#8b98a8", BELT_HI = "#aab6c4", ROLLER = "#b6c0cc";

  function build(mount) {
    var C = EPR.colors();
    var st = { mode: "cusum", formula: false, step: -1, round: null, stopIndex: null, rang: null, revealed: false, ended: false, waterTween: null, bellTimer: null };

    mount.innerHTML =
      '<div class="epr-fig">' +
        '<div class="epr-head"><div><div class="epr-kicker">Precision eye-drop line</div>' +
        '<div class="epr-title">The overfill tank</div></div></div>' +
        '<div class="epr-hint" id="g-hint"></div>' +
        '<svg class="epr-stage" id="g-stage" viewBox="0 0 760 210" role="img" aria-label="A conveyor belt of small eye-drop bottles filled to a line, and a tank catching the overfill"></svg>' +
        '<div class="epr-readouts" id="g-read"></div>' +
        '<div class="epr-bar">' +
          '<button class="epr-btn primary" id="g-next">&#9654; Next bottle</button>' +
          '<button class="epr-btn" id="g-call">I see drift</button>' +
          '<button class="epr-btn" id="g-reset">&#8635; New batch</button>' +
          '<span class="epr-spacer"></span>' +
          '<span class="epr-seg" id="g-mode"><button data-m="manual">You measure</button><button data-m="cusum" class="on">CUSUM</button></span>' +
          '<button class="epr-chiptog" id="g-formula">Formula</button>' +
        '</div>' +
        '<svg class="epr-chart" id="g-chart" viewBox="0 0 760 130" role="img" aria-label="Wasted oil in the tank over bottles"></svg>' +
        '<div id="g-formula-box"></div>' +
        '<div class="epr-result" id="g-result"></div>' +
      '</div>';

    var $ = function (id) { return mount.querySelector(id); };
    var stage = $("#g-stage"), chart = $("#g-chart"), hint = $("#g-hint"),
        read = $("#g-read"), result = $("#g-result"), formulaBox = $("#g-formula-box");

    var S = {};
    buildStage();
    function buildStage() {
      clear(stage);
      var g = svg("g", {}, stage), sx, rx;
      // conveyor belt
      var belt = svg("g", {}, g);
      svg("rect", { x: ROWL - 22, y: BBOT, width: ROWR - ROWL + 40, height: 10, fill: BELT }, belt);
      svg("rect", { x: ROWL - 22, y: BBOT, width: ROWR - ROWL + 40, height: 3, fill: BELT_HI }, belt);
      for (sx = ROWL - 16; sx < ROWR + 18; sx += 20) svg("line", { x1: sx, y1: BBOT + 2, x2: sx - 4, y2: BBOT + 9, stroke: "#6e7c8d", "stroke-width": 1, opacity: 0.55 }, belt);
      for (rx = ROWL - 14; rx < ROWR + 20; rx += 34) svg("circle", { cx: rx, cy: BBOT + 16, r: 6, fill: ROLLER, stroke: BELT, "stroke-width": 1 }, belt);
      svg("rect", { x: ROWL - 6, y: BBOT + 20, width: 5, height: 14, fill: "#9aa7b5" }, belt);
      svg("rect", { x: ROWR + 8, y: BBOT + 20, width: 5, height: 14, fill: "#9aa7b5" }, belt);
      S.lineG = svg("g", {}, g);
      S.leakG = svg("g", {}, g);
      S.wBubble = svg("g", { opacity: 0 }, g);
      svg("rect", { x: -34, y: -13, width: 68, height: 24, rx: 8, fill: C.ink }, S.wBubble);
      S.wText = svg("text", { x: 0, y: 4, "font-size": 13.5, "font-weight": 700, fill: "#fff", "text-anchor": "middle" }, S.wBubble);
      // overfill tank with funnel
      var tg = svg("g", {}, g);
      svg("path", { d: "M " + (TANK_X + 8) + " " + (TANK_TOP - 13) + " L " + (TANK_X + TANK_W - 8) + " " + (TANK_TOP - 13) + " L " + (TANK_X + TANK_W / 2 + 7) + " " + TANK_TOP + " L " + (TANK_X + TANK_W / 2 - 7) + " " + TANK_TOP + " Z", fill: "#d2dae3", stroke: C.muted, "stroke-width": 1 }, tg);
      svg("rect", { x: TANK_X, y: TANK_TOP, width: TANK_W, height: TANK_BOT - TANK_TOP, rx: 8, fill: C.surface, stroke: C.ink, "stroke-width": 2 }, tg);
      S.water = svg("rect", { x: TANK_X + 4, y: TANK_BOT - 4, width: TANK_W - 8, height: 0, rx: 4, fill: LIQ, opacity: 0.85 }, tg);
      [0, 0.5, 1.0].forEach(function (gv) {
        var ty = TANK_BOT - gv * PXG;
        svg("line", { x1: TANK_X - 5, y1: ty, x2: TANK_X, y2: ty, stroke: C.muted, "stroke-width": 1 }, tg);
        svg("text", { x: TANK_X - 8, y: ty + 4, "font-size": 10.5, fill: C.muted, "text-anchor": "end" }, tg).textContent = gv.toFixed(1);
      });
      S.rim = svg("line", { x1: TANK_X, y1: rimY, x2: TANK_X + TANK_W, y2: rimY, stroke: C.alarmStrong, "stroke-width": 2, "stroke-dasharray": "6 4" }, tg);
      svg("text", { x: TANK_X + TANK_W + 5, y: rimY + 4, "font-size": 13, "font-weight": 600, fill: C.alarmStrong }, tg).textContent = "H";
      svg("text", { x: TANK_X + TANK_W / 2, y: TANK_BOT + 19, "font-size": 12.5, "font-weight": 600, fill: C.ink, "text-anchor": "middle" }, tg).textContent = "overfill tank (mL)";
      S.spout = svg("rect", { x: TANK_X + TANK_W - 3, y: TANK_BOT - 12, width: 8, height: 5, rx: 1, fill: C.muted, opacity: 0 }, tg);
      S.bellG = svg("g", { transform: "translate(" + (TANK_X + TANK_W / 2) + ",60)" }, tg);
      S.bell = svg("path", { d: "M -8 4 Q -8 -8 0 -8 Q 8 -8 8 4 L 10 8 L -10 8 Z", fill: "#cbd5e1", stroke: C.muted, "stroke-width": 1 }, S.bellG);
      svg("circle", { cx: 0, cy: 10, r: 2, fill: C.muted }, S.bellG);
    }

    function drawLineup(newOver) {
      clear(S.lineG);
      svg("line", { x1: ROWL - 20, y1: FL, x2: ROWR + 2, y2: FL, stroke: C.expected, "stroke-width": 1.4, "stroke-dasharray": "4 5", opacity: 0.9 }, S.lineG);
      svg("text", { x: ROWL - 22, y: FL - 4, "font-size": 11.5, fill: C.expected, "text-anchor": "end" }, S.lineG).textContent = "fill line";
      svg("text", { x: ROWL - 22, y: FL + 11, "font-size": 10, fill: C.muted, "text-anchor": "end" }, S.lineG).textContent = "3.0 mL";
      for (var i = 0; i <= st.step; i++) {
        var dev = st.round.x[i] - MU0, isNew = i === st.step;
        var ov = (isNew && newOver != null) ? newOver : Math.max(0, dev);
        bottle(slotX(i), dev, ov, isNew);
      }
      if (st.step >= 0) {
        var ncx = slotX(st.step);
        svg("rect", { x: ncx - 9, y: BTOP - 32, width: 18, height: 11, rx: 2, fill: "#d2dae3", stroke: C.muted, "stroke-width": 1 }, S.lineG);
        svg("rect", { x: ncx - 2, y: BTOP - 21, width: 4, height: 7, fill: C.muted }, S.lineG);
      }
    }
    function bottle(cx, dev, ov, isNew) {
      var bw = Math.min(11, SLOT - 1.5), hw = bw / 2;
      svg("rect", { x: cx - hw, y: BTOP, width: bw, height: BBOT - BTOP, rx: 2.5, fill: GLASS, stroke: GLASS_ST, "stroke-width": 0.8, opacity: isNew ? 1 : 0.93 }, S.lineG);
      svg("rect", { x: cx - 1, y: BTOP - 13, width: 2, height: 4, rx: 1, fill: CAP, opacity: isNew ? 1 : 0.85 }, S.lineG);
      svg("rect", { x: cx - 3.6, y: BTOP - 10, width: 7.2, height: 9, rx: 2, fill: CAP, opacity: isNew ? 1 : 0.85 }, S.lineG);
      var oilTop = dev < 0 ? Math.min(BBOT - 2, FL - dev * PXG) : FL;
      svg("rect", { x: cx - hw + 1, y: oilTop, width: bw - 2, height: BBOT - 1 - oilTop, fill: LIQ, opacity: 0.85 }, S.lineG);
      if (ov > 0) { var at = Math.max(BTOP + 1, FL - ov * PXG); svg("rect", { x: cx - hw + 1, y: at, width: bw - 2, height: FL - at, rx: 1, fill: OVER, opacity: 0.88 }, S.lineG); }
      if (isNew) svg("rect", { x: cx - hw - 1.5, y: BTOP - 1, width: bw + 3, height: BBOT - BTOP + 2, rx: 3.5, fill: "none", stroke: C.accent, "stroke-width": 1.6 }, S.lineG);
    }
    function showWeight(cx, w) {
      S.wBubble.setAttribute("transform", "translate(" + EPR.clamp(cx, 56, 504) + "," + (BTOP - 44) + ")");
      S.wText.textContent = w.toFixed(2) + " mL";
      S.wBubble.setAttribute("opacity", 1);
    }
    function leakDrip() {
      if (EPR.reducedMotion()) return;
      clear(S.leakG);
      S.spout.setAttribute("opacity", 0.9);
      var d = svg("circle", { cx: TANK_X + TANK_W + 2, cy: TANK_BOT - 8, r: 2.4, fill: LIQ, opacity: 0.8 }, S.leakG);
      EPR.tween(TANK_BOT - 8, TANK_BOT + 16, 340, function (y) { d.setAttribute("cy", y); d.setAttribute("opacity", Math.max(0, 0.8 * (1 - (y - (TANK_BOT - 8)) / 24))); }, function () { if (d.parentNode) d.parentNode.removeChild(d); S.spout.setAttribute("opacity", 0); });
    }

    function newRound() {
      var seed = Math.floor(Math.random() * 1e9), rnd = EPR.rng(seed), z = [];
      for (var i = 0; i < N; i++) z.push(EPR.gauss(rnd));
      st.round = { z: z, driftStart: 10 + Math.floor(rnd() * (N - 18)) };
      buildData();
      st.step = -1; st.stopIndex = null; st.rang = null; st.revealed = false; st.ended = false;
      clear(S.lineG); clear(S.leakG); S.wBubble.setAttribute("opacity", 0); stillBell(); setTankStatic(0);
      result.classList.remove("show");
      setHint("Every bottle of these expensive eye drops must fill to the <b>line</b>. Solution <b>over the line</b> (amber) is wasted drug, straight off your margin, and the tank catches it. Click <b>Next bottle</b>; every bottle stays on the belt so you watch the whole run.", "");
      renderReadouts(); drawChart();
    }
    function buildData() {
      var r = st.round, x = [], manual = [], cusum = [], pm = 0, pc = 0;
      for (var i = 0; i < N; i++) {
        x.push(EPR.round(MU0 + (i >= r.driftStart ? DELTA : 0) + r.z[i] * SIGMA, 2));
        var ov = Math.max(0, x[i] - MU0);
        pm = pm + ov; manual.push(pm);
        pc = Math.max(0, pc + ov - K); cusum.push(pc);
      }
      r.x = x; r.manual = manual; r.cusum = cusum;
    }
    function series() { return st.mode === "cusum" ? st.round.cusum : st.round.manual; }

    function setTankStatic(level) { tankTo(level, false); }
    function tankTo(level, animate) {
      var h = EPR.clamp(level, 0, TMAX) * PXG, over = level > H;
      S.water.setAttribute("fill", over ? C.alarmStrong : LIQ);
      function ap(v) { S.water.setAttribute("height", v); S.water.setAttribute("y", TANK_BOT - 4 - v); }
      if (st.waterTween) st.waterTween.stop();
      var cur = parseFloat(S.water.getAttribute("height")) || 0;
      if (animate) st.waterTween = EPR.tween(cur, h, 240, ap); else ap(h);
      if (over) ringBell(); else stillBell();
    }
    function ringBell() {
      S.bell.setAttribute("fill", "#fcd34d");
      if (EPR.reducedMotion() || st.bellTimer) return;
      var n = 0, tx = TANK_X + TANK_W / 2;
      st.bellTimer = setInterval(function () {
        n++; S.bellG.setAttribute("transform", "translate(" + tx + ",60) rotate(" + (n % 2 ? 12 : -12) + ")");
        if (n > 5) { clearInterval(st.bellTimer); st.bellTimer = null; S.bellG.setAttribute("transform", "translate(" + tx + ",60)"); }
      }, 95);
    }
    function stillBell() { if (st.bellTimer) { clearInterval(st.bellTimer); st.bellTimer = null; } S.bell.setAttribute("fill", "#cbd5e1"); S.bellG.setAttribute("transform", "translate(" + (TANK_X + TANK_W / 2) + ",60)"); }

    function nextBottle() {
      if (st.ended || st.step >= N - 1) return;
      st.step++;
      var w = st.round.x[st.step], cx = slotX(st.step), level = series()[st.step];
      renderReadouts();
      drawLineup(null);
      showWeight(cx, w);
      if (st.mode === "cusum") leakDrip();
      tankTo(level, true);
      drawChart();
      afterStep();
    }
    function afterStep() {
      if (st.step >= 0 && series()[st.step] > H) { st.rang = st.step; st.ended = true; st.revealed = true; showResult(); return; }
      if (st.step >= N - 1) { st.ended = true; st.revealed = true; showResult(); }
    }

    function renderReadouts() {
      if (st.step < 0) { read.innerHTML = chip("bottles", "0 of " + N) + chip("tank", "0.00 mL", "good"); return; }
      var w = st.round.x[st.step], dev = w - MU0, level = series()[st.step], over = level > H;
      read.innerHTML =
        chip("bottle", "#" + (st.step + 1)) +
        chip("fill", w.toFixed(2) + " mL", Math.abs(dev) > 3 * SIGMA ? "warn" : "") +
        chip("over line", (dev >= 0 ? "+" : "") + dev.toFixed(2) + " mL", dev > 0 ? "warn" : "good") +
        chip("wasted", level.toFixed(2) + " mL", over ? "bad" : "") +
        chip("status", over ? "OVERFLOW" : "running", over ? "bad" : "good");
    }
    function chip(l, v, c) { return '<div class="epr-chip ' + (c || "") + '"><span>' + l + '</span><span class="v epr-spin">' + v + '</span></div>'; }

    var ML = 50, MR = 22, MT = 14, MB = 28, CW = 760, CH = 130;
    function clampY(v) { return Math.max(MT, Math.min(CH - MB, v)); }
    function drawChart() {
      clear(chart);
      var g = svg("g", {}, chart), s = series(), upto = st.step;
      var x = lin(0, N - 1, ML, CW - MR), yMax = Math.max(H * 1.7, 1.0), y = lin(0, yMax, CH - MB, MT);
      svg("line", { x1: ML, y1: y(0), x2: CW - MR, y2: y(0), stroke: C.muted, "stroke-width": 1 }, g);
      [0, H].forEach(function (t) { svg("text", { x: ML - 8, y: y(t) + 4, "font-size": 12, fill: C.muted, "text-anchor": "end" }, g).textContent = t.toFixed(1); });
      svg("text", { x: ML, y: MT - 1, "font-size": 11.5, fill: C.muted }, g).textContent = "wasted solution (mL)";
      svg("text", { x: (ML + CW - MR) / 2, y: CH - 3, "font-size": 12, fill: C.muted, "text-anchor": "middle" }, g).textContent = "bottle number";
      svg("line", { x1: ML, y1: y(H), x2: CW - MR, y2: y(H), stroke: C.alarmStrong, "stroke-width": 2, "stroke-dasharray": "6 4" }, g);
      svg("text", { x: CW - MR, y: y(H) - 6, "font-size": 12.5, "font-weight": 600, fill: C.alarmStrong, "text-anchor": "end" }, g).textContent = "stop H";
      if (st.revealed) {
        var d = st.round.driftStart;
        svg("line", { x1: x(d), y1: MT, x2: x(d), y2: CH - MB, stroke: C.expected, "stroke-width": 1.6, "stroke-dasharray": "3 4" }, g);
        svg("text", { x: x(d) + 4, y: MT + 11, "font-size": 11.5, fill: C.expected }, g).textContent = "drift began";
      }
      if (upto >= 0) {
        var dd = "M" + x(0).toFixed(1) + " " + clampY(y(0)).toFixed(1) + " ";
        for (var i = 0; i <= upto; i++) dd += "L" + x(i).toFixed(1) + " " + clampY(y(s[i])).toFixed(1) + " ";
        dd += "L" + x(upto).toFixed(1) + " " + clampY(y(0)).toFixed(1) + " Z";
        svg("path", { d: dd, fill: C.accentSoft }, g);
        var dl = "";
        for (var j = 0; j <= upto; j++) dl += (j ? "L" : "M") + x(j).toFixed(1) + " " + clampY(y(s[j])).toFixed(1) + " ";
        svg("path", { d: dl, fill: "none", stroke: C.accent, "stroke-width": 2.3, "stroke-linejoin": "round", "stroke-linecap": "round" }, g);
        if (st.rang != null) svg("circle", { cx: x(st.rang), cy: clampY(y(s[st.rang])), r: 4.2, fill: C.alarmStrong }, g);
      }
      if (st.stopIndex != null) { svg("line", { x1: x(st.stopIndex), y1: MT, x2: x(st.stopIndex), y2: CH - MB, stroke: C.accent, "stroke-width": 2, opacity: 0.5 }, g); svg("text", { x: x(st.stopIndex), y: MT + 11, "font-size": 11.5, "font-weight": 600, fill: C.accent, "text-anchor": "middle" }, g).textContent = "you"; }
    }
    function setHint(html, cls) { hint.className = "epr-hint " + (cls || ""); hint.innerHTML = html; }

    function renderFormula() {
      if (!st.formula) { formulaBox.innerHTML = ""; return; }
      formulaBox.innerHTML =
        '<div class="epr-formula"><span class="s">tank</span> = ' + (st.mode === "cusum" ? 'max( 0 , ' : '') + '<span class="s">tank</span> + <span class="k">overfill</span>' + (st.mode === "cusum" ? ' &minus; <span class="k">tolerance</span> )' : '') + ' &nbsp; stop when <span class="s">tank</span> &gt; <span class="h">H</span></div>' +
        '<div class="epr-legend">' + leg(OVER, "overfill = mL over the line") + (st.mode === "cusum" ? leg(C.muted, "tolerance = 0.10 mL/bottle leaks away") : "") + leg(LIQ, "tank = wasted solution") + leg(C.alarmStrong, "H stop level = 0.70 mL") + '</div>';
    }
    function leg(color, text) { return '<span class="epr-leg"><span class="epr-sw" style="background:' + color + '"></span>' + text + '</span>'; }

    function callDrift() {
      if (st.step < 0 || st.ended || st.stopIndex != null) return;
      st.stopIndex = st.step;
      setHint("You flagged the filler at bottle " + (st.step + 1) + ". Keep going to the end of the batch to see how your call compares to the real drift and to the tank.", "");
      drawChart();
    }
    function reevaluate() {
      if (!st.round || st.step < 0) { st.ended = false; st.rang = null; return; }
      var s = series(), rang = -1;
      for (var i = 0; i <= st.step; i++) { if (s[i] > H) { rang = i; break; } }
      st.rang = rang >= 0 ? rang : null;
      st.ended = rang >= 0 || st.step >= N - 1;
      if (st.ended) { st.revealed = true; showResult(); }
      else { result.classList.remove("show"); setHint("Now running in <b>" + (st.mode === "cusum" ? "CUSUM" : "you-measure") + "</b> mode. Keep clicking <b>Next bottle</b> to finish this same batch.", ""); }
    }
    function showResult() {
      var r = st.round, rang = st.rang != null ? st.rang : -1, you = st.stopIndex, ds = r.driftStart, cls;
      var msg = "<b>Batch over. The filler began overfilling at bottle " + (ds + 1) + "</b> (teal line). ";
      if (rang >= 0 && rang < ds) { msg += (st.mode === "cusum" ? "The tank" : "Your running total") + " brimmed over at bottle " + (rang + 1) + ", a false alarm that would stop a line still in spec."; cls = "bad"; }
      else if (rang >= 0) { msg += "The tank brimmed over at bottle " + (rang + 1) + ", " + (rang - ds) + " bottle" + (rang - ds === 1 ? "" : "s") + " after the drift. Stop and recalibrate the filler."; cls = "good"; }
      else { msg += "The batch finished and the tank never brimmed; the line stayed in spec."; cls = "warn"; }
      if (you != null) msg += " You flagged bottle " + (you + 1) + (you >= ds ? "." : ", a false alarm.");
      if (st.mode === "manual") msg += " With no tolerance the tank fills on ordinary scatter too, so it overflows even on a healthy line; switch to CUSUM to allow a small tolerance.";
      result.className = "epr-result show " + cls; result.innerHTML = msg;
      drawChart();
      setHint("Batch over. Hit <b>New batch</b> for a fresh hidden drift, or flip the mode to replay this same batch under the other rule.", "");
    }

    $("#g-next").onclick = nextBottle;
    $("#g-call").onclick = callDrift;
    $("#g-reset").onclick = function () { stillBell(); newRound(); };
    mount.querySelectorAll("#g-mode button").forEach(function (b) {
      b.onclick = function () {
        st.mode = b.getAttribute("data-m");
        mount.querySelectorAll("#g-mode button").forEach(function (o) { o.classList.toggle("on", o === b); });
        reevaluate();
        if (st.step >= 0) setTankStatic(series()[st.step]);
        renderReadouts(); drawChart(); renderFormula();
      };
    });
    $("#g-formula").onclick = function () { st.formula = !st.formula; $("#g-formula").classList.toggle("on", st.formula); renderFormula(); };

    newRound();
    renderFormula();
  }

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", init);
  else init();
})();

</script>
</body></html>
